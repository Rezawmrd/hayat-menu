<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hayat Complex Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */
body{
    margin:0;
    font-family:'Vazirmatn',sans-serif;
    background:#0b0b0b;
    color:#fff;
    overflow-x:hidden;
}

/* ================= CINEMATIC BACKGROUND ================= */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 30%, rgba(212,175,55,0.10), transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(255,215,0,0.06), transparent 45%),
        radial-gradient(circle at 50% 80%, rgba(212,175,55,0.08), transparent 50%);
    animation: drift 12s ease-in-out infinite alternate;
    pointer-events:none;
    z-index:0;
}

@keyframes drift{
    from{transform:scale(1) translateY(0);}
    to{transform:scale(1.05) translateY(-10px);}
}

/* ================= INTRO ================= */
#intro{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
    animation: fadeOut 1.5s ease forwards;
    animation-delay:3s;
}

#intro img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:2px solid #d4af37;
    box-shadow:0 0 25px rgba(212,175,55,0.4);
    object-fit:cover;
    animation: logoFloat 4s ease-in-out infinite;
}

#intro h1{
    color:#d4af37;
    margin-top:15px;
    letter-spacing:3px;
}

/* ================= HEADER ================= */
header{
    text-align:center;
    padding:25px 10px;
    border-bottom:1px solid rgba(212,175,55,0.3);
    position:relative;
    z-index:1;
}

header img{
    width:90px;
    height:90px;
    border-radius:50%;
    border:2px solid #d4af37;
    object-fit:cover;
    box-shadow:0 0 20px rgba(212,175,55,0.3);
    animation: logoFloat 4s ease-in-out infinite;
}

@keyframes logoFloat{
    0%{transform:translateY(0); box-shadow:0 0 10px rgba(212,175,55,0.3);}
    50%{transform:translateY(-4px); box-shadow:0 0 25px rgba(212,175,55,0.5);}
    100%{transform:translateY(0); box-shadow:0 0 10px rgba(212,175,55,0.3);}
}

header h1{
    margin:0;
    color:#d4af37;
}

/* ================= BUTTONS ================= */
.actions{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
}

.btn{
    background:#151515;
    border:1px solid #333;
    color:#fff;
    padding:8px 14px;
    border-radius:8px;
    text-decoration:none;
    transition:0.3s;
}

.btn:hover{
    border-color:#d4af37;
    color:#d4af37;
    box-shadow:0 0 15px rgba(212,175,55,0.25);
}


/* ================= TABS ================= */
.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:15px 0;
}

.tab-btn{
    background:#151515;
    border:1px solid #333;
    color:#fff;
    padding:8px 14px;
    border-radius:20px;
}

.tab-btn.active{
    border-color:#d4af37;
    color:#d4af37;
}

/* ================= MENU ================= */
.container{
    max-width:520px;
    margin:auto;
    padding:20px;
    position:relative;
    z-index:1;
}

.section{ display:none; }
.section.active{ display:block; }

.section h2{
    color:#d4af37;
    border-right:3px solid #d4af37;
    padding-right:10px;
}

/* ================= CINEMATIC CARDS (Scroll Reveal) ================= */
.card{
    background:#151515;
    padding:11px 14px;
    margin-bottom:8px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;

    opacity:0;
    transform:translateY(30px);
    transition:all 0.6s ease;

    border:1px solid rgba(212,175,55,0.05);
}

.card.show{
    opacity:1;
    transform:translateY(0);
}

.card:hover{
    transform:scale(1.03);
    box-shadow:0 0 20px rgba(212,175,55,0.15);
}

.price{
    color:#d4af37;
}

/* ================= FOOTER ================= */
.footer{
    text-align:center;
    padding:25px 10px;
    color:#888;
    border-top:1px solid #222;
}

.footer .btn{
    margin-top:10px;
    display:inline-block;
    border:1px solid #d4af37;
    color:#d4af37;
}

.footer .btn:hover{
    background:#d4af37;
    color:#000;
    box-shadow:0 0 15px rgba(212,175,55,0.4);
}

html{scroll-behavior:smooth;}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <img src="file_000000005f7471fdbdd33eefd3f2e476.png">
    <h1>HAYAT COMPLEX</h1>
</div>

<!-- HEADER -->
<header>
    <img src="file_000000005f7471fdbdd33eefd3f2e476.png">
    <h1>HAYAT COMPLEX</h1>

    <div class="actions">
        <a class="btn" href="https://instagram.com/hayat_complex">📷 اینستاگرام</a>
        <a class="btn" href="tel:+989011286503">📞 تماس</a>
    </div>
</header>

<!-- TABS -->
<div class="tabs">
    <button class="tab-btn active" onclick="show('breakfast',this)">صبحانه</button>
    <button class="tab-btn" onclick="show('food',this)">غذا</button>
    <button class="tab-btn" onclick="show('cake',this)">کیک</button>
    <button class="tab-btn" onclick="show('hot',this)">نوشیدنی گرم</button>
    <button class="tab-btn" onclick="show('cold',this)">نوشیدنی سرد</button>
</div>
<!-- BREAKFAST -->
<div id="breakfast" class="section">
    <h2>صبحانه</h2>

    <div class="card">
        <span>املت</span>
        <span class="price">...</span>
    </div>

    <div class="card">
        <span>صبحانه انگلیسی</span>
        <span class="price">...</span>
    </div>
</div>

<!-- FOOD -->
<div id="food" class="section">
    <h2>غذا</h2>

    <div class="card">
        <span>برگر</span>
        <span class="price">...</span>
    </div>

    <div class="card">
        <span>پاستا</span>
        <span class="price">...</span>
    </div>
</div>

<!-- CAKE -->
<div id="cake" class="section">
    <h2>کیک</h2>

    <div class="card">
        <span>چیزکیک</span>
        <span class="price">...</span>
    </div>

    <div class="card">
        <span>براونی</span>
        <span class="price">...</span>
    </div>
</div>
    
    
<!-- HOT -->
<div id="hot" class="section active">
<h2>نوشیدنی‌های گرم</h2>

<div class="card"><span>اسپرسو</span><span class="price">60</span></div>
<div class="card"><span>آمریکانو</span><span class="price">100</span></div>
<div class="card"><span>لاته</span><span class="price">160</span></div>
<div class="card"><span>کاپوچینو</span><span class="price">160</span></div>
<div class="card"><span>موکا</span><span class="price">160</span></div>

</div>

<!-- COLD -->
<div id="cold" class="section">
<h2>نوشیدنی‌های سرد</h2>

<div class="card"><span>آیس لاته</span><span class="price">160</span></div>
<div class="card"><span>موهیتو</span><span class="price">160</span></div>
<div class="card"><span>شیک‌ها</span><span class="price">190</span></div>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
<a class="btn" target="_blank"
href="https://maps.app.goo.gl/aWadQYgRioEBqEuSA">
📍 مسیر‌یابی به کافه
</a>
</div>

<script>

/* TAB SWITCH */
function show(tab,btn){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));

    document.getElementById(tab).classList.add('active');
    btn.classList.add('active');

    triggerReveal(); // وقتی تب عوض شد هم انیمیشن اجرا شود
}

/* SCROLL / REVEAL */
const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add("show");
        }
    });
},{threshold:0.15});

function triggerReveal(){
    document.querySelectorAll(".card").forEach(c=>{
        observer.observe(c);
    });
}

/* INIT */
triggerReveal();

/* INTRO */
setTimeout(()=>{
    document.getElementById("intro").style.display="none";
},3000);

</script>

</body>
</html>
