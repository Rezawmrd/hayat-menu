<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hayat Complex Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Vazirmatn',sans-serif;
    background:#0b0b0b;
    color:#fff;
}

/* ===== INTRO ===== */
#intro{
    position:fixed;
    inset:0;
    background:#0b0b0b;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
    animation: fadeOut 1s ease forwards;
    animation-delay:2.5s;
}

#intro img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:2px solid #d4af37;
    padding:5px;
    object-fit:cover;
    animation: popIn 1.2s ease;
}

#intro h1{
    color:#d4af37;
    margin-top:15px;
}

@keyframes popIn{
    0%{transform:scale(0.3); opacity:0;}
    100%{transform:scale(1); opacity:1;}
}

@keyframes fadeOut{
    to{opacity:0; visibility:hidden;}
}

/* ===== HEADER ===== */
header{
    text-align:center;
    padding:25px 10px;
    border-bottom:1px solid #d4af37;
}

header img{
    width:90px;
    height:90px;
    border-radius:50%;
    border:2px solid #d4af37;
    padding:4px;
    object-fit:cover;
}

header h1{
    margin:0;
    color:#d4af37;
}

/* ===== TABS ===== */
.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:15px 0;
    flex-wrap:wrap;
}

.tab-btn{
    background:#151515;
    border:1px solid #333;
    color:#fff;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    font-size:13px;
    transition:0.2s;
}

.tab-btn.active{
    border-color:#d4af37;
    color:#d4af37;
}

/* ===== MENU ===== */
.container{
    max-width:520px;
    margin:auto;
    padding:20px;
}

.section{
    display:none;
    margin-bottom:30px;
}

.section.active{
    display:block;
}

.section h2{
    color:#d4af37;
    border-right:3px solid #d4af37;
    padding-right:10px;
    margin-bottom:15px;
}

.card{
    background:#151515;
    padding:11px 14px;
    margin-bottom:8px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
}

.price{
    color:#d4af37;
}

/* ===== FOOTER ===== */
.footer{
    text-align:center;
    padding:25px 10px;
    color:#888;
    border-top:1px solid #222;
    font-size:13px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <img src="file_000000005f7471fdbdd33eefd3f2e476.png">
    <h1>HAYAT COMPLEX</h1>
</div>

<!-- HEADER -->
<header>
    <img src="file_000000005f7471fdbdd33eefd3f2e476.png">
    <h1>HAYAT COMPLEX</h1>
</header>

<!-- TABS -->
<div class="tabs">
    <button class="tab-btn active" onclick="showTab('hot', this)">☕ گرم</button>
    <button class="tab-btn" onclick="showTab('cold', this)">🧊 سرد</button>
</div>

<div class="container">

<!-- HOT -->
<div id="hot" class="section active">

<h2>نوشیدنی‌های گرم</h2>

<div class="card"><span>اسپرسو</span><span class="price">60</span></div>
<div class="card"><span>آمریکانو</span><span class="price">100</span></div>
<div class="card"><span>لاته</span><span class="price">160</span></div>
<div class="card"><span>کاپوچینو</span><span class="price">160</span></div>
<div class="card"><span>موکا</span><span class="price">160</span></div>
<div class="card"><span>کارامل ماکیاتو</span><span class="price">160</span></div>

</div>

<!-- COLD -->
<div id="cold" class="section">

<h2>نوشیدنی‌های سرد</h2>

<div class="card"><span>آیس لاته</span><span class="price">160</span></div>
<div class="card"><span>موهیتو</span><span class="price">160</span></div>
<div class="card"><span>شیک‌ها</span><span class="price">190</span></div>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
📷 @hayat_complex | 📞 +98 901 128 6503
</div>

<script>
setTimeout(()=>{
    document.getElementById("intro").style.display="none";
},2500);

function showTab(tab, btn){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));

    document.getElementById(tab).classList.add('active');
    btn.classList.add('active');
}
</script>

</body>
</html>
