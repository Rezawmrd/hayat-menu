<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hayat Complex Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Vazirmatn',sans-serif;
    background:#0b0b0b;
    color:#fff;
    overflow-x:hidden;
}

/* ===== BACKGROUND GLOW ===== */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 30%, rgba(212,175,55,0.10), transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(255,215,0,0.06), transparent 45%),
        radial-gradient(circle at 50% 80%, rgba(212,175,55,0.08), transparent 50%);
    animation: drift 12s ease-in-out infinite alternate;
    pointer-events:none;
    z-index:0;
}

@keyframes drift{
    from{transform:scale(1) translateY(0);}
    to{transform:scale(1.05) translateY(-10px);}
}

/* ===== INTRO ===== */
#intro{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
    animation: fadeOut 1.5s ease forwards;
    animation-delay:3s;
}

#intro img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:2px solid #d4af37;
    box-shadow:0 0 25px rgba(212/175/55,0.4);
    object-fit:cover;
}

#intro h1{
    color:#d4af37;
    margin-top:15px;
    letter-spacing:3px;
}

/* ===== HEADER ===== */
header{
    text-align:center;
    padding:25px 10px;
    border-bottom:1px solid rgba(212,175,55,0.3);
    position:relative;
    z-index:1;
}

header img{
    width:90px;
    height:90px;
    border-radius:50%;
    border:2px solid #d4af37;
    object-fit:cover;
    box-shadow:0 0 20px rgba(212,175,55,0.3);
}

header h1{
    margin:0;
    color:#d4af37;
}

/* ===== BUTTONS ===== */
.actions{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
}

.btn{
    background:#151515;
    border:1px solid #333;
    color:#fff;
    padding:8px 14px;
    border-radius:8px;
    text-decoration:none;
    transition:0.3s;
}

.btn:hover{
    border-color:#d4af37;
    color:#d4af37;
    box-shadow:0 0 15px rgba(212,175,55,0.25);
}

/* ===== TABS ===== */
.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:15px 0;
}

.tab-btn{
    background:#151515;
    border:1px solid #333;
    color:#fff;
    padding:8px 14px;
    border-radius:20px;
}

.tab-btn.active{
    border-color:#d4af37;
    color:#d4af37;
}

/* ===== SEARCH ===== */
.search-box{
    max-width:520px;
    margin:10px auto 15px;
    padding:0 20px;
    position:relative;
    z-index:2;
}

.search-box input{
    width:100%;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid #333;
    background:#151515;
    color:#fff;
    outline:none;
}

.search-box input:focus{
    border-color:#d4af37;
    box-shadow:0 0 12px rgba(212,175,55,0.2);
}

/* ===== MENU ===== */
.container{
    max-width:520px;
    margin:auto;
    padding:20px;
    position:relative;
    z-index:1;
}

.section{ display:none; }
.section.active{ display:block; }

.section h2{
    color:#d4af37;
    border-right:3px solid #d4af37;
    padding-right:10px;
}

/* ===== CARDS ===== */
.card{
    background:#151515;
    padding:11px 14px;
    margin-bottom:8px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
    box-shadow:0 0 20px rgba(212,175,55,0.15);
}

.price{
    color:#d4af37;
}

/* ===== FOOTER ===== */
.footer{
    text-align:center;
    padding:25px 10px;
    color:#888;
    border-top:1px solid #222;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <img src="file_000000005f7471fdbdd33eefd3f2e476.png">
    <h1>HAYAT COMPLEX</h1>
</div>

<!-- HEADER -->
<header>
    <img src="file_000000005f7471fdbdd33eefd3f2e476.png">
    <h1>HAYAT COMPLEX</h1>

    <div class="actions">
        <a class="btn" href="https://instagram.com/hayat_complex">📷 اینستاگرام</a>
        <a class="btn" href="tel:+989011286503">📞 تماس</a>
    </div>
</header>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" id="searchInput" placeholder="🔍 جستجو در منو...">
</div>

<!-- TABS -->
<div class="tabs">
    <button class="tab-btn active" onclick="show('hot',this)">گرم</button>
    <button class="tab-btn" onclick="show('cold',this)">سرد</button>
</div>

<div class="container">

<!-- HOT -->
<div id="hot" class="section active">
<h2>نوشیدنی‌های گرم</h2>

<div class="card"><span>اسپرسو</span><span class="price">60</span></div>
<div class="card"><span>آمریکانو</span><span class="price">100</span></div>
<div class="card"><span>لاته</span><span class="price">160</span></div>
<div class="card"><span>کاپوچینو</span><span class="price">160</span></div>
<div class="card"><span>موکا</span><span class="price">160</span></div>
<div class="card"><span>هات چاکلت</span><span class="price">160</span></div>

</div>

<!-- COLD -->
<div id="cold" class="section">
<h2>نوشیدنی‌های سرد</h2>

<div class="card"><span>آیس لاته</span><span class="price">160</span></div>
<div class="card"><span>موهیتو</span><span class="price">160</span></div>
<div class="card"><span>شیک‌ها</span><span class="price">190</span></div>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
📷 @hayat_complex | 📞 +98 901 128 6503
</div>

<script>

function show(tab,btn){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));

    document.getElementById(tab).classList.add('active');
    btn.classList.add('active');
}

/* ===== SEARCH FUNCTION ===== */
document.getElementById("searchInput").addEventListener("input", function () {
    let value = this.value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        let text = card.innerText.toLowerCase();
        card.style.display = text.includes(value) ? "flex" : "none";
    });
});

/* intro */
setTimeout(()=>{
    document.getElementById("intro").style.display="none";
},3000);

</script>

</body>
</html>
