<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hayat Complex</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Vazirmatn',sans-serif;
    background:#0b0b0b;
    color:#fff;
    overflow-x:hidden;
}

/* ===== CINEMATIC LIGHT BACKGROUND ===== */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 30%, rgba(212,175,55,0.10), transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(255,215,0,0.06), transparent 45%),
        radial-gradient(circle at 50% 80%, rgba(212,175,55,0.08), transparent 50%);
    animation: drift 12s ease-in-out infinite alternate;
    pointer-events:none;
    z-index:0;
}

@keyframes drift{
    0%{ transform:scale(1) translateY(0px); }
    100%{ transform:scale(1.05) translateY(-10px); }
}

/* ===== CINEMATIC INTRO ===== */
#intro{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
    animation: introOut 1.5s ease forwards;
    animation-delay:3s;
}

#intro img{
    width:130px;
    height:130px;
    border-radius:50%;
    border:2px solid #d4af37;
    box-shadow:0 0 30px rgba(212,175,55,0.4);
    animation: zoomGlow 2s ease;
}

#intro h1{
    color:#d4af37;
    margin-top:15px;
    letter-spacing:3px;
    animation: fadeUp 2s ease;
}

@keyframes zoomGlow{
    0%{transform:scale(0.2); opacity:0;}
    100%{transform:scale(1); opacity:1;}
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes introOut{
    to{opacity:0; visibility:hidden;}
}

/* ===== HEADER ===== */
header{
    text-align:center;
    padding:25px 10px;
    border-bottom:1px solid rgba(212,175,55,0.3);
    position:relative;
    z-index:1;
    animation: fadeIn 2s ease;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

header img{
    width:90px;
    height:90px;
    border-radius:50%;
    border:2px solid #d4af37;
    box-shadow:0 0 25px rgba(212,175,55,0.3);
}

header h1{
    margin:0;
    color:#d4af37;
    animation: glow 3s infinite ease-in-out;
}

@keyframes glow{
    0%{text-shadow:0 0 5px rgba(212,175,55,0.2);}
    50%{text-shadow:0 0 15px rgba(212,175,55,0.5);}
    100%{text-shadow:0 0 5px rgba(212,175,55,0.2);}
}

/* ===== BUTTONS ===== */
.actions{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
}

.btn{
    background:#151515;
    border:1px solid #333;
    color:#fff;
    padding:8px 14px;
    border-radius:8px;
    text-decoration:none;
    transition:0.3s;
}

.btn:hover{
    border-color:#d4af37;
    box-shadow:0 0 15px rgba(212,175,55,0.3);
    transform:scale(1.05);
    color:#d4af37;
}

/* ===== TABS ===== */
.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:15px 0;
    position:relative;
    z-index:1;
}

.tab-btn{
    background:#151515;
    border:1px solid #333;
    color:#fff;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    transition:0.3s;
}

.tab-btn.active{
    background:rgba(212,175,55,0.1);
    border-color:#d4af37;
    color:#d4af37;
    box-shadow:0 0 12px rgba(212,175,55,0.3);
}

/* ===== MENU ===== */
.container{
    max-width:520px;
    margin:auto;
    padding:20px;
    position:relative;
    z-index:1;
}

.section{
    display:none;
}

.section.active{
    display:block;
}

.section h2{
    color:#d4af37;
    border-right:3px solid #d4af37;
    padding-right:10px;
}

/* ===== CINEMATIC CARDS ===== */
.card{
    background:#151515;
    padding:12px 14px;
    margin-bottom:10px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;

    opacity:0;
    transform: translateY(25px);
    animation: cardIn 0.8s ease forwards;

    border:1px solid rgba(212,175,55,0.05);
    transition:0.4s;
}

@keyframes cardIn{
    to{
        opacity:1;
        transform: translateY(0);
    }
}

/* stagger cinematic */
.card:nth-child(1){ animation-delay:0.05s; }
.card:nth-child(2){ animation-delay:0.1s; }
.card:nth-child(3){ animation-delay:0.15s; }
.card:nth-child(4){ animation-delay:0.2s; }
.card:nth-child(5){ animation-delay:0.25s; }
.card:nth-child(6){ animation-delay:0.3s; }
.card:nth-child(7){ animation-delay:0.35s; }

.card:hover{
    transform: scale(1.04);
    background:#1f1f1f;
    box-shadow:
        0 0 20px rgba(212,175,55,0.2),
        0 0 40px rgba(212,175,55,0.1);
}

.price{
    color:#d4af37;
}

.card:hover .price{
    text-shadow:0 0 12px rgba(212,175,55,0.7);
}

/* ===== FOOTER ===== */
.footer{
    text-align:center;
    padding:25px 10px;
    color:#888;
    border-top:1px solid #222;
    position:relative;
    z-index:1;
}

/* smooth scroll cinematic feel */
html{
    scroll-behavior:smooth;
}

</style>
</head>

<body>

<!-- CINEMATIC INTRO -->
<div id="intro">
    <img src="file_000000005f7471fdbdd33eefd3f2e476.png">
    <h1>HAYAT COMPLEX</h1>
</div>

<!-- HEADER -->
<header>
    <img src="file_000000005f7471fdbdd33eefd3f2e476.png">
    <h1>HAYAT COMPLEX</h1>

    <div class="actions">
        <a class="btn" href="https://instagram.com/hayat_complex" target="_blank">📷 اینستاگرام</a>
        <a class="btn" href="tel:+989011286503">📞 تماس</a>
    </div>
</header>

<!-- TABS -->
<div class="tabs">
    <button class="tab-btn active" onclick="showTab('hot', this)">☕ گرم</button>
    <button class="tab-btn" onclick="showTab('cold', this)">🧊 سرد</button>
    <button class="tab-btn" onclick="showTab('all', this)">🍽 همه</button>
</div>

<div class="container">

<!-- HOT -->
<div id="hot" class="section active">
<h2>نوشیدنی‌های گرم</h2>

<div class="card"><span>اسپرسو</span><span class="price">60</span></div>
<div class="card"><span>آمریکانو</span><span class="price">100</span></div>
<div class="card"><span>لاته</span><span class="price">160</span></div>
<div class="card"><span>کاپوچینو</span><span class="price">160</span></div>
<div class="card"><span>موکا</span><span class="price">160</span></div>

</div>

<!-- COLD -->
<div id="cold" class="section">
<h2>نوشیدنی‌های سرد</h2>

<div class="card"><span>آیس لاته</span><span class="price">160</span></div>
<div class="card"><span>موهیتو</span><span class="price">160</span></div>
<div class="card"><span>شیک‌ها</span><span class="price">190</span></div>

</div>

<!-- ALL -->
<div id="all" class="section">
<h2>همه آیتم‌ها</h2>

<div class="card"><span>اسپرسو</span><span class="price">60</span></div>
<div class="card"><span>آمریکانو</span><span class="price">100</span></div>
<div class="card"><span>لاته</span><span class="price">160</span></div>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
📷 @hayat_complex | 📞 +98 901 128 6503
</div>

<script>
setTimeout(()=>{
    document.getElementById("intro").style.display="none";
},3000);

function showTab(tab, btn){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));

    document.getElementById(tab).classList.add('active');
    btn.classList.add('active');
}
</script>

</body>
</html>
