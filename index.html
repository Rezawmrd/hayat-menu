<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hayat Complex Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Vazirmatn', sans-serif;
    background: #0b0b0b;
    color: #fff;
}

header {
    text-align: center;
    padding: 30px 10px;
    border-bottom: 1px solid #d4af37;
}

header h1 {
    color: #d4af37;
    margin: 0;
    letter-spacing: 2px;
}

header p {
    color: #aaa;
    margin-top: 5px;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

.section {
    margin-bottom: 30px;
}

.section h2 {
    color: #d4af37;
    border-right: 3px solid #d4af37;
    padding-right: 10px;
    margin-bottom: 15px;
}

.card {
    background: #151515;
    padding: 12px 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    transition: 0.3s;
}

.card:hover {
    background: #1f1f1f;
    transform: scale(1.02);
}

.price {
    color: #d4af37;
}

.footer {
    text-align: center;
    padding: 30px 10px;
    color: #888;
    border-top: 1px solid #222;
    margin-top: 30px;
}
</style>
</head>

<body>

<header>
    <h1>HAYAT COMPLEX</h1>
    <p>☕ منوی کافه</p>
</header>

<div class="container">

    <div class="section">
        <h2>نوشیدنی‌های گرم</h2>

        <div class="card">
            <span>اسپرسو</span>
            <span class="price">60</span>
        </div>

        <div class="card">
            <span>آمریکانو</span>
            <span class="price">100</span>
        </div>

        <div class="card">
            <span>لاته</span>
            <span class="price">160</span>
        </div>
    </div>

    <div class="section">
        <h2>نوشیدنی‌های سرد</h2>

        <div class="card">
            <span>آیس لاته</span>
            <span class="price">180</span>
        </div>

        <div class="card">
            <span>موهیتو</span>
            <span class="price">170</span>
        </div>
    </div>

</div>

<div class="footer">
📍 Hayat Complex | 📷 @hayat_complex | 📞 +98 901 128 6503
</div>

</body>
</html>
