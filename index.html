<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hayat Complex Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* ===== LOADING SCREEN ===== */
#intro{
    position:fixed;
    inset:0;
    background:#0b0b0b;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
    animation: fadeOut 1s ease forwards;
    animation-delay:2.5s;
}

#intro img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:2px solid #d4af37;
    padding:5px;
    object-fit:cover;
    animation: popIn 1.2s ease;
}

#intro h1{
    color:#d4af37;
    margin-top:15px;
    font-size:18px;
    letter-spacing:2px;
    animation: fadeUp 1.5s ease;
}

@keyframes popIn{
    0%{transform:scale(0.3); opacity:0;}
    100%{transform:scale(1); opacity:1;}
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes fadeOut{
    to{
        opacity:0;
        visibility:hidden;
    }
}

/* ===== MAIN ===== */
body{
    margin:0;
    font-family:'Vazirmatn',sans-serif;
    background:#0b0b0b;
    color:#fff;
}

header{
    text-align:center;
    padding:30px 10px;
    border-bottom:1px solid #d4af37;
}

header img{
    width:100px;
    height:100px;
    border-radius:50%;
    border:2px solid #d4af37;
    padding:4px;
    object-fit:cover;
    margin-bottom:10px;
}

header h1{
    margin:0;
    color:#d4af37;
    letter-spacing:2px;
}

header p{
    color:#aaa;
}

.actions{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
    flex-wrap:wrap;
}

.btn{
    background:#151515;
    border:1px solid #333;
    color:#fff;
    padding:8px 14px;
    border-radius:8px;
    text-decoration:none;
    font-size:13px;
}

.btn:hover{
    border-color:#d4af37;
    color:#d4af37;
}

.container{
    max-width:520px;
    margin:auto;
    padding:20px;
}

.section{
    margin-bottom:30px;
}

.section h2{
    color:#d4af37;
    border-right:3px solid #d4af37;
    padding-right:10px;
    margin-bottom:15px;
}

.card{
    background:#151515;
    padding:11px 14px;
    margin-bottom:8px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
}

.price{
    color:#d4af37;
}

.footer{
    text-align:center;
    padding:25px 10px;
    color:#888;
    border-top:1px solid #222;
    font-size:13px;
    margin-top:20px;
}

</style>
</head>

<body>

<!-- 🔥 INTRO LOADING -->
<div id="intro">
    <img src="file_000000005f7471fdbdd33eefd3f2e476.png">
    <h1>HAYAT COMPLEX</h1>
</div>

<header>
    <img src="file_000000005f7471fdbdd33eefd3f2e476.png">
    <h1>HAYAT COMPLEX</h1>
    <p>☕ منوی دیجیتال کافه</p>

    <div class="actions">
        <a class="btn" href="https://instagram.com/hayat_complex" target="_blank">📷 اینستاگرام</a>
        <a class="btn" href="tel:+989011286503">📞 تماس</a>
    </div>
</header>

<div class="container">

<div class="section">
<h2>نوشیدنی‌های گرم</h2>
<div class="card"><span>اسپرسو</span><span class="price">60</span></div>
<div class="card"><span>آمریکانو</span><span class="price">100</span></div>
<div class="card"><span>لاته</span><span class="price">160</span></div>
<div class="card"><span>کاپوچینو</span><span class="price">160</span></div>
<div class="card"><span>موکا</span><span class="price">160</span></div>
<div class="card"><span>کارامل ماکیاتو</span><span class="price">160</span></div>
</div>

<div class="section">
<h2>نوشیدنی‌های سرد</h2>
<div class="card"><span>آیس لاته</span><span class="price">160</span></div>
<div class="card"><span>موهیتو</span><span class="price">160</span></div>
<div class="card"><span>شیک‌ها</span><span class="price">190</span></div>
</div>

</div>

<div class="footer">
📷 @hayat_complex | 📞 +98 901 128 6503
</div>

<script>
setTimeout(()=>{
    document.getElementById("intro").style.display="none";
}, 2500);
</script>

</body>
</html>
